<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>orash katu</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --border: #272b34;
    --text: #e6e8ec;
    --muted: #8b909a;
    --accent: #3b82f6;
    --green: #16a34a;
    --amber: #d97706;
    --red: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .field { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .field input, .field select {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px;
  }
  .tuning-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
    background: #12151b; border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 14px; margin-bottom: 16px;
  }
  .tune-toggle {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); background: transparent; border: none; padding: 0; cursor: pointer;
  }
  .tune-toggle:hover { color: var(--text); border: none; }
  .tune-controls { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; flex: 1; }
  /* keep the spinner arrows always visible (not just on hover) */
  .tune-controls input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  .tune-controls.folded { display: none; }
  .reset-btn { margin-left: auto; padding: 5px 11px; font-size: 12px; background: transparent; border: none; color: var(--muted); }
  .reset-btn:hover { color: var(--text); border: none; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.searching { background: var(--amber); animation: pulse 1s infinite; }
  .dot.online { background: var(--green); }
  .dot.offline { background: var(--red); }
  @keyframes pulse { 50% { opacity: 0.3; } }
  button {
    background: #222833; color: var(--text); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 13px; font-size: 13px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  .info-bar { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .info-bar .dur { color: #4ade80; font-weight: 700; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
  .card {
    position: relative; overflow: hidden; cursor: pointer;
    background: #14171d; border: 1px solid var(--border); border-radius: 6px; padding: 11px;
    display: flex; align-items: center;
  }
  .card:hover { border-color: #3a4250; }
  .card.disabled { opacity: 0.45; cursor: default; }
  .card .name { position: relative; z-index: 1; font-size: 12.5px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 6px; }
  .mk { flex: none; display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 3px; font-size: 9px; font-weight: 800; }
  .mk.spot { background: #6b521f; color: #f0c674; }
  .mk.fut  { background: #1f5e38; color: #74e39b; }
  .age { position: relative; z-index: 1; margin-left: auto; flex: none; padding-left: 8px;
    font-size: 10px; font-weight: 600; }
  .age-fresh { color: #4ade80; }
  .age-mid   { color: var(--muted); }
  .age-old   { color: #fbbf24; }
  .age-stale { color: #f87171; }
  .age-purple { color: #c084fc; }
  .age-never { color: #4b515c; }
  .card-fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0; z-index: 0;
    background: rgba(22, 163, 74, 0.4); transition: width 0.25s ease;
  }
  .empty { text-align: center; color: var(--muted); padding: 48px 0; font-size: 14px; }

  #results { margin-top: 26px; }
  #results h2 { font-size: 15px; font-weight: 600; margin: 0 0 14px; }
  .thumb-grid { display: grid; justify-content: start; gap: 10px; } /* columns sized in JS */
  .thumb {
    background: #0c0e12; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px; display: flex; flex-direction: column; gap: 5px; cursor: pointer;
  }
  .thumb:hover { border-color: var(--accent); }
  .thumb canvas { display: block; border-radius: 3px; } /* size set in JS */
  .thumb .tlabel { font-size: 11px; color: var(--text); text-align: center; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .more-wrap { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 16px; }
  .scroll-up { width: 34px; padding: 7px 0; text-align: center; color: var(--muted); }
  .scroll-up:hover { color: var(--text); }
</style>
</head>
<body>
  <header>
    <h1>orash katu</h1>
    <div class="controls">
      <div class="field">Timeframe
        <select id="tfSelect">
          <option>M1</option><option selected>M5</option><option>M10</option><option>M15</option>
          <option>M30</option><option>H1</option><option>H4</option><option>D1</option>
        </select>
      </div>
      <div class="field">Filter
        <input id="filterInput" type="text" placeholder="ticker…" style="width:110px" />
      </div>
      <div class="field">Min delta $
        <input id="minDeltaInput" type="number" min="0" step="1000" value="0" style="width:90px" />
      </div>
      <div class="field">Max delta $
        <input id="maxDeltaInput" type="number" min="0" step="1000" value="0" title="0 = no cap" style="width:90px" />
      </div>
      <div class="field">Binding
        <input id="bindingInput" type="text" placeholder="none" maxlength="3" style="width:54px" />
      </div>
      <div class="status"><span id="dot" class="dot"></span><span id="statusText">Idle</span></div>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <div class="tuning-bar">
    <button id="tuneToggle" class="tune-toggle"><span id="tuneCaret">▸</span> Tuning</button>
    <div class="tune-controls folded" id="tuneControls">
      <div class="field">Max rows <input id="maxRowsInput" type="number" min="5" max="300" step="1" value="80" title="auto-fit cap" style="width:74px" /></div>
      <div class="field">Height <input id="hInput" type="number" min="40" max="500" step="2" value="224" style="width:74px" /></div>
      <div class="field">Width <input id="wInput" type="number" min="40" max="500" step="2" value="224" style="width:74px" /></div>
      <div class="field">Width-exp <input id="wExpInput" type="number" min="0.1" max="2" step="0.05" value="1" style="width:74px" /></div>
      <div class="field">Bright-exp <input id="bExpInput" type="number" min="0.1" max="3" step="0.05" value="1" style="width:74px" /></div>
      <div class="field">Floor <input id="floorInput" type="number" min="0" max="0.5" step="0.01" value="0.3" style="width:74px" /></div>
      <button id="resetTuneBtn" class="reset-btn">Reset defaults</button>
    </div>
  </div>

  <div class="info-bar" id="infoBar">Scanning for a running MetaScalp instance&hellip;</div>
  <div class="grid" id="grid"></div>
  <div id="results"></div>

<script>
// MetaScalp delta cluster maps — see MetaScalp-Api.md
// Discovery → connections → main-group tickers, all over REST. Clicking a market renders a
// contact sheet of miniature delta footprints — one per ticker with cluster data. Each
// thumbnail is the time columns × price levels (high at top); balanced levels drop out and
// per one-sided level: color = side (green buy / red sell), width + brightness = |delta|
// vs the map's max delta. Rows auto-fit (centered, fixed bar height). AskSize/BidSize are USD.
const HOST = "127.0.0.1";
const PORT_START = 17845;
const PORT_END = 17855;
const ZOOM_INDEX = 1;
const FETCH_CONCURRENCY = 10;
const PAGE = 80;             // thumbnails per "Show more" page

// Live-tunable render settings (read from the UI; persisted in localStorage).
const TUNE_KEY = "orashkatu.tune";
const DEFAULTS = {
  maxRows: 80,     // rows auto-fit to the data, capped here; beyond this it bins down
  w: 224, h: 224,  // canvas display size (CSS px); backing store = ×dpr
  widthExp: 1,     // bar width curve: w ∝ (delta/maxDelta)^widthExp  (1 = linear)
  brightExp: 1,    // brightness curve: alpha ∝ (delta/maxDelta)^brightExp (1 = linear)
  floor: 0.3,      // minimum brightness for the faintest shown delta
};
const settings = { ...DEFAULTS };

const dot = document.getElementById("dot");
const statusText = document.getElementById("statusText");
const infoBar = document.getElementById("infoBar");
const grid = document.getElementById("grid");
const results = document.getElementById("results");
const refreshBtn = document.getElementById("refreshBtn");
const tfSelect = document.getElementById("tfSelect");
const filterInput = document.getElementById("filterInput");
const minDeltaInput = document.getElementById("minDeltaInput");
const maxDeltaInput = document.getElementById("maxDeltaInput");
const maxRowsInput = document.getElementById("maxRowsInput");
const hInput = document.getElementById("hInput");
const wInput = document.getElementById("wInput");
const wExpInput = document.getElementById("wExpInput");
const bExpInput = document.getElementById("bExpInput");
const floorInput = document.getElementById("floorInput");
const resetTuneBtn = document.getElementById("resetTuneBtn");
const tuneToggle = document.getElementById("tuneToggle");
const tuneCaret = document.getElementById("tuneCaret");
const tuneControls = document.getElementById("tuneControls");
const tuneInputs = [maxRowsInput, hInput, wInput, wExpInput, bExpInput, floorInput];

function setTuneFolded(folded) {
  tuneControls.classList.toggle("folded", folded);
  tuneCaret.textContent = folded ? "▸" : "▾";
}

// Pull the tuning controls into `settings` (clamped to sane ranges).
function readSettings() {
  const clamp = (v, lo, hi, dflt) => Number.isFinite(v) ? Math.min(hi, Math.max(lo, v)) : dflt;
  settings.maxRows = Math.round(clamp(parseInt(maxRowsInput.value, 10), 5, 300, DEFAULTS.maxRows));
  settings.h = Math.round(clamp(parseFloat(hInput.value), 40, 500, DEFAULTS.h));
  settings.w = Math.round(clamp(parseFloat(wInput.value), 40, 500, DEFAULTS.w));
  settings.widthExp = clamp(parseFloat(wExpInput.value), 0.1, 2, DEFAULTS.widthExp);
  settings.brightExp = clamp(parseFloat(bExpInput.value), 0.1, 3, DEFAULTS.brightExp);
  settings.floor = clamp(parseFloat(floorInput.value), 0, 0.5, DEFAULTS.floor);
}

// Put a settings object into the input boxes.
function applyToInputs(s) {
  maxRowsInput.value = s.maxRows;
  hInput.value = s.h; wInput.value = s.w;
  wExpInput.value = s.widthExp; bExpInput.value = s.brightExp; floorInput.value = s.floor;
}

// Persist current tune to localStorage; load it back (or defaults) on startup.
function saveTune() { try { localStorage.setItem(TUNE_KEY, JSON.stringify(settings)); } catch (_) {} }
function loadTune() {
  let s = { ...DEFAULTS };
  try {
    const raw = localStorage.getItem(TUNE_KEY);
    if (raw) s = { ...DEFAULTS, ...JSON.parse(raw) };
  } catch (_) {}
  applyToInputs(s);
  readSettings(); // clamp + sync into `settings`
}

// Persist the everyday prefs (timeframe, min delta, binding) too.
const PREF_KEY = "orashkatu.prefs";
function savePrefs() {
  try {
    localStorage.setItem(PREF_KEY, JSON.stringify({
      tf: tfSelect.value, minDelta: minDeltaInput.value, maxDelta: maxDeltaInput.value,
      binding: bindingInput.value, tuneFolded: tuneControls.classList.contains("folded"),
    }));
  } catch (_) {}
}
function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem(PREF_KEY) || "{}");
    if (p.tf) tfSelect.value = p.tf;
    if (p.minDelta != null) minDeltaInput.value = p.minDelta;
    if (p.maxDelta != null) maxDeltaInput.value = p.maxDelta;
    if (p.binding != null) bindingInput.value = p.binding;
    setTuneFolded(p.tuneFolded !== false); // folded by default
  } catch (_) {}
}
const bindingInput = document.getElementById("bindingInput");

let activePort = null;
let lastConn = null;        // connection the current maps belong to (for change-ticker)
let galleryCtx = null;      // { label, timeFrame, items:[{ticker, model}] }
let shownCount = 0;
let scanToken = 0;          // bumped each scan; a stale scan bails when it sees a newer token
let scanAbort = null;       // AbortController for the in-flight scan's fetches
let scanCard = null;        // the connection card currently scanning (for its progress fill)

function setCardFill(card, pct) {
  const f = card && card.querySelector(".card-fill");
  if (f) f.style.width = Math.max(0, Math.min(100, pct)) + "%";
}

// Spot connection? (MarketType 0, or "spot" in the market name.)
function isSpot(c) { return pick(c, "MarketType") === 0 || /spot/i.test(c.Market || ""); }

// Last-scanned timestamps, keyed by exchange+market (survives connection-Id rotation).
const SCAN_KEY = "orashkatu.scans";
let scanTimes = {};
try { scanTimes = JSON.parse(localStorage.getItem(SCAN_KEY) || "{}"); } catch (_) {}
function connKey(c) { return `${pick(c, "ExchangeId")}:${pick(c, "MarketType")}`; }
function markScanned(c) {
  scanTimes[connKey(c)] = Date.now();
  try { localStorage.setItem(SCAN_KEY, JSON.stringify(scanTimes)); } catch (_) {}
  refreshAges();
}
function ageText(ts) {
  if (!ts) return "—";
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return "now";
  if (s < 3600) return Math.floor(s / 60) + "m";       // < 1h: 1-minute steps
  if (s < 28800) {                                      // 1h–8h: 10-minute steps
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 600) * 10;
    return m ? `${h}h ${m}m` : `${h}h`;
  }
  return "—";                                           // ≥ 8h: treat as never scanned
}
function ageClass(ts) {
  if (!ts) return "age-never";
  const s = (Date.now() - ts) / 1000;
  if (s < 900) return "age-fresh";     // green  < 15m
  if (s < 1800) return "age-old";      // yellow < 30m
  if (s < 3600) return "age-stale";    // red    < 1h
  if (s < 6000) return "age-purple";   // purple < 100m
  if (s < 28800) return "age-mid";     // muted  < 8h
  return "age-never";                  // ≥ 8h → treat as never scanned
}
// Update the age labels on existing cards in place (cheap; runs on a 30s interval).
function refreshAges() {
  for (const el of grid.querySelectorAll(".card .age")) {
    const ts = scanTimes[el.parentElement.dataset.key];
    el.textContent = ageText(ts);
    el.className = "age " + ageClass(ts);
  }
}

// Format a millisecond duration: "6.3s" under a minute, else "1m 2s" / "2m 24s".
function fmtDuration(ms) {
  const s = ms / 1000;
  if (s < 60) return s.toFixed(1) + "s";
  return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
}

// Moon-phase spinner for the scan progress line.
const MOONS = ["🌑", "🌒", "🌓", "🌔", "🌕", "🌖", "🌗", "🌘"];
let spinnerTimer = null, spinnerFrame = 0, progressText = "";
function startSpinner() {
  if (spinnerTimer) return;
  spinnerTimer = setInterval(() => {
    spinnerFrame = (spinnerFrame + 1) % MOONS.length;
    infoBar.textContent = `${MOONS[spinnerFrame]} ${progressText}`;
  }, 120);
}
function stopSpinner() {
  if (spinnerTimer) { clearInterval(spinnerTimer); spinnerTimer = null; }
}

// Case-insensitive key lookup — the live API mixes lowercase wrapper keys with PascalCase
// inner fields, so never assume one casing (see CLAUDE.md).
function pick(obj, ...keys) {
  if (!obj) return undefined;
  for (const k of keys) {
    if (obj[k] !== undefined) return obj[k];
    const lower = k.toLowerCase();
    const match = Object.keys(obj).find(o => o.toLowerCase() === lower);
    if (match) return obj[match];
  }
  return undefined;
}

function setStatus(cls, text) { dot.className = "dot " + cls; statusText.textContent = text; }

// Run async `worker` over `items` with bounded concurrency.
async function runPool(items, worker, concurrency) {
  const out = new Array(items.length);
  let next = 0;
  async function lane() {
    while (next < items.length) { const i = next++; out[i] = await worker(items[i], i); }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, lane));
  return out;
}

// ---- Discovery / connections / tickers ----

async function ping(port) {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 600);
    const res = await fetch(`http://${HOST}:${port}/ping`, { signal: ctrl.signal });
    clearTimeout(t);
    if (!res.ok) return null;
    const data = await res.json();
    if (pick(data, "App") === "MetaScalp") return { port, version: pick(data, "Version") };
  } catch (_) {}
  return null;
}

async function discover() {
  const ports = [];
  for (let p = PORT_START; p <= PORT_END; p++) ports.push(p);
  const found = await Promise.all(ports.map(ping));
  return found.find(Boolean) || null;
}

async function fetchConnections(port) {
  const res = await fetch(`http://${HOST}:${port}/api/connections`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return pick(await res.json(), "Connections") || [];
}

// GET /tickers?Refresh=true — fresh from exchange; filter non-tradable; biggest quote group.
async function fetchMainGroup(port, connId) {
  const res = await fetch(`http://${HOST}:${port}/api/connections/${connId}/tickers?Refresh=true`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const tickers = pick(await res.json(), "Tickers") || [];
  const groups = new Map();
  for (const t of tickers) {
    if (pick(t, "IsTradingAllowed") !== true) continue;
    const quote = pick(t, "QuoteAsset") || "—";
    const name = pick(t, "Name");
    if (!name) continue;
    if (!groups.has(quote)) groups.set(quote, []);
    groups.get(quote).push(name);
  }
  let main = { quote: null, tickers: [] };
  for (const [quote, names] of groups) {
    if (names.length > main.tickers.length) main = { quote, tickers: names };
  }
  return main;
}

async function fetchClusterSnapshot(port, connId, ticker, timeFrame, signal) {
  const url = `http://${HOST}:${port}/api/connections/${connId}/cluster-snapshot`
    + `?Ticker=${encodeURIComponent(ticker)}&TimeFrame=${timeFrame}&ZoomIndex=${ZOOM_INDEX}`;
  const res = await fetch(url, { signal });
  if (!res.ok) return null;
  return res.json();
}

// ---- Thumbnail model + drawing ----

// Parse a snapshot into raw, row-count-independent form so we can re-bin live when the
// user changes the row count. Returns { cols:[[{p,bid,ask}…]…], lo, hi, rawMaxDelta } or null.
// rawMaxDelta = biggest |bid-ask| over individual price levels (stable; used by Min-delta filter).
function buildRaw(snap) {
  const cols = pick(snap, "Columns") || [];
  if (!cols.length) return null;
  const inc = Number(pick(snap, "PriceIncrement")) || 0; // price step, for auto-fit row count
  let lo = Infinity, hi = -Infinity, rawMaxDelta = 0;
  const out = [];
  for (const col of cols) {
    const lv = [];
    for (const it of pick(col, "Items") || []) {
      const p = Number(pick(it, "Price"));
      if (!Number.isFinite(p)) continue;
      if (p < lo) lo = p;
      if (p > hi) hi = p;
      const bid = Number(pick(it, "BidSize")) || 0;
      const ask = Number(pick(it, "AskSize")) || 0;
      const d = Math.abs(bid - ask);
      if (d > rawMaxDelta) rawMaxDelta = d;
      lv.push({ p, bid, ask });
    }
    out.push(lv);
  }
  if (!Number.isFinite(lo) || !Number.isFinite(hi) || rawMaxDelta <= 0) return null;
  return { cols: out, lo, hi, inc, rawMaxDelta };
}

// Row count for a thumbnail: auto-fit (one row per price step in the range), capped at
// maxRows — beyond that it bins down to maxRows.
function effectiveRows(raw) {
  const natural = raw.inc > 0 ? Math.round((raw.hi - raw.lo) / raw.inc) + 1 : settings.maxRows;
  return Math.max(4, Math.min(settings.maxRows, natural));
}

// Bin raw levels into a C x rows grid (high price at top). maxDelta = biggest binned
// |bid-ask| across all bars — the shared width + brightness calibration.
function buildModel(raw, rows) {
  const C = raw.cols.length, R = rows, span = raw.hi - raw.lo;
  const bid = new Float64Array(C * R);
  const ask = new Float64Array(C * R);
  for (let c = 0; c < C; c++) {
    for (const lv of raw.cols[c]) {
      const row = span > 0 ? Math.round((raw.hi - lv.p) / span * (R - 1)) : 0;
      const idx = c * R + row;
      bid[idx] += lv.bid;
      ask[idx] += lv.ask;
    }
  }
  let maxDelta = 0;
  for (let i = 0; i < bid.length; i++) {
    const d = Math.abs(bid[i] - ask[i]);
    if (d > maxDelta) maxDelta = d;
  }
  return { C, R, bid, ask, maxDelta: maxDelta || 1 };
}

// Draw the delta footprint: time bars (columns) x price levels (high at top). Each level is
// a horizontal bar in its column slot; balanced levels drop out (only net delta shows).
//   COLOR      = side: green = buy (bid-heavy), red = sell (ask-heavy).
//   WIDTH      = (|delta|/maxDelta)^widthExp — biggest one-sided level / anomaly is widest.
//   BRIGHTNESS = floor + (1-floor)·(|delta|/maxDelta)^brightExp — small deltas stay dim.
function drawThumb(cv, m) {
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#0b0d11";
  ctx.fillRect(0, 0, cv.width, cv.height);
  const cw = cv.width / m.C;
  // Fixed per-level bar height (= frame / maxRows), so bars are the same size on every
  // chart. A chart with fewer levels uses fewer bars, centered vertically (empty top/bottom).
  const barH = cv.height / settings.maxRows;
  const yOff = (cv.height - m.R * barH) / 2;
  const maxDelta = m.maxDelta || 1;
  for (let c = 0; c < m.C; c++) {
    for (let r = 0; r < m.R; r++) {
      const i = c * m.R + r;
      const b = m.bid[i], a = m.ask[i];
      const dAbs = Math.abs(b - a);
      if (dAbs <= 0) continue;                         // skip balanced / empty levels
      const nv = dAbs / maxDelta;
      const w = Math.max(1, Math.pow(nv, settings.widthExp) * cw);
      const alpha = settings.floor + (1 - settings.floor) * Math.pow(nv, settings.brightExp);
      const col = b >= a ? "46,214,104" : "236,72,60";
      ctx.fillStyle = `rgba(${col},${alpha.toFixed(3)})`;
      ctx.fillRect(c * cw, yOff + r * barH, w, barH + 0.6);
    }
  }
}

// ---- Build + render the contact sheet for a connection ----

async function showMaps(conn, card) {
  const tickers = conn.MainGroup ? conn.MainGroup.tickers : [];
  if (!tickers.length) return;
  const timeFrame = tfSelect.value;

  // Cancel any scan already running, and clear every card's fill (incl. a previously
  // completed green one), before starting this one.
  if (scanAbort) scanAbort.abort();
  grid.querySelectorAll(".card-fill").forEach(f => { f.style.width = "0%"; });
  const myToken = ++scanToken;
  scanAbort = new AbortController();
  const signal = scanAbort.signal;
  scanCard = card;

  setCardFill(card, 0);
  lastConn = conn;
  galleryCtx = null;        // drop the previous exchange's data so a mid-scan filter can't revive it
  const label = conn.Name ?? `Connection ${conn.Id}`;
  results.innerHTML = "";
  progressText = `Fetching ${tickers.length} cluster snapshot(s) for ${label} (${timeFrame})…`;
  startSpinner();

  const t0 = performance.now();
  let done = 0;
  const raws = await runPool(tickers, async (ticker) => {
    if (signal.aborted) return null;
    let raw = null;
    try {
      const snap = await fetchClusterSnapshot(activePort, conn.Id, ticker, timeFrame, signal);
      if (snap) raw = buildRaw(snap);
    } catch (_) {}
    done++;
    if (myToken === scanToken && (done % 5 === 0 || done === tickers.length)) {
      progressText = `Fetched ${done}/${tickers.length} snapshot(s) for ${label}…`;
      setCardFill(card, (done / tickers.length) * 100); // green fill, left → right
    }
    return raw ? { ticker, raw } : null;
  }, FETCH_CONCURRENCY);

  if (myToken !== scanToken) return; // a newer scan superseded this one — drop our results
  stopSpinner();
  scanAbort = null;
  scanCard = null;
  setCardFill(card, 100); // keep the card green until the next scan
  markScanned(conn);      // stamp + refresh the "last scanned" age labels
  const dur = fmtDuration(performance.now() - t0);
  const items = raws.filter(Boolean);
  if (!items.length) {
    infoBar.innerHTML = `${label}: no cluster data for any ticker (${tickers.length} scanned in <span class="dur">${dur}</span>).`;
    results.innerHTML = `<div class="empty">No delta cluster data.</div>`;
    return;
  }

  galleryCtx = { label, timeFrame, items };
  shownCount = PAGE;
  filterInput.value = "";
  renderGallery();
  infoBar.innerHTML = `${label}: ${items.length}/${tickers.length} ticker(s) with cluster data · ${timeFrame} · <span class="dur">${dur}</span>.`;
}

function renderGallery() {
  if (!galleryCtx) return;
  readSettings();
  const { label, timeFrame, items } = galleryCtx;
  const q = filterInput.value.trim().toUpperCase();
  const minD = Math.max(0, parseFloat(minDeltaInput.value) || 0);
  const maxD = Math.max(0, parseFloat(maxDeltaInput.value) || 0); // 0 = no cap
  const filtered = items.filter(it =>
    (!q || it.ticker.toUpperCase().includes(q)) &&
    it.raw.rawMaxDelta >= minD &&
    (maxD <= 0 || it.raw.rawMaxDelta <= maxD));
  const shown = filtered.slice(0, shownCount);

  results.innerHTML = "";

  const h2 = document.createElement("h2");
  h2.textContent = `${label} — ${filtered.length} map(s)${q ? ` matching “${q}”` : ""} · ${timeFrame}`
    + (filtered.length > shown.length ? ` (showing ${shown.length})` : "");
  results.appendChild(h2);

  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const gridEl = document.createElement("div");
  gridEl.className = "thumb-grid";
  gridEl.style.gridTemplateColumns = `repeat(auto-fill, ${settings.w + 14}px)`;
  for (const it of shown) {
    const card = document.createElement("div");
    card.className = "thumb";
    card.style.width = (settings.w + 14) + "px";
    card.dataset.ticker = it.ticker;

    const cv = document.createElement("canvas");
    cv.width = Math.round(settings.w * dpr);   // backing store at device resolution → crisp
    cv.height = Math.round(settings.h * dpr);
    cv.style.width = settings.w + "px";         // displayed 1:1, no CSS scaling/blur
    cv.style.height = settings.h + "px";
    drawThumb(cv, buildModel(it.raw, effectiveRows(it.raw)));
    card.appendChild(cv);

    const lab = document.createElement("div");
    lab.className = "tlabel";
    lab.textContent = it.ticker;
    card.appendChild(lab);

    gridEl.appendChild(card);
  }
  results.appendChild(gridEl);

  if (shown.length) {
    const wrap = document.createElement("div");
    wrap.className = "more-wrap";
    const more = document.createElement("button");
    const remaining = filtered.length - shown.length;
    if (remaining > 0) {
      more.textContent = `Show more (${remaining})`;
      more.addEventListener("click", () => { shownCount += PAGE; renderGallery(); });
    } else {
      more.textContent = "the end";
      more.disabled = true;
    }
    const up = document.createElement("button");
    up.className = "scroll-up";
    up.textContent = "↑";
    up.title = "Scroll to top";
    up.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    wrap.appendChild(more);
    wrap.appendChild(up);
    results.appendChild(wrap);
  }
}

// Live filtering as you type (reset paging).
function onFilterChange() {
  if (!galleryCtx) return;
  shownCount = PAGE;
  renderGallery();
}
filterInput.addEventListener("input", onFilterChange);
minDeltaInput.addEventListener("input", onFilterChange);
maxDeltaInput.addEventListener("input", onFilterChange);

// Persist everyday prefs on change (timeframe applies on the next scan).
tfSelect.addEventListener("change", savePrefs);
minDeltaInput.addEventListener("input", savePrefs);
maxDeltaInput.addEventListener("input", savePrefs);
bindingInput.addEventListener("input", savePrefs);

// Tuning controls — re-render with new settings (no refetch), then persist.
for (const el of tuneInputs) {
  el.addEventListener("input", () => { readSettings(); saveTune(); if (galleryCtx) renderGallery(); });
}
resetTuneBtn.addEventListener("click", () => {
  applyToInputs(DEFAULTS); readSettings(); saveTune(); if (galleryCtx) renderGallery();
});
tuneToggle.addEventListener("click", () => {
  setTuneFolded(!tuneControls.classList.contains("folded"));
  savePrefs();
});

// Click a thumbnail → set that ticker in MetaScalp on the maps' connection.
results.addEventListener("click", (e) => {
  const card = e.target.closest(".thumb");
  if (card) changeTicker(card.dataset.ticker);
});

// POST /api/change-ticker — switch MetaScalp's active ticker (+ optional binding).
async function changeTicker(ticker) {
  if (!lastConn || !ticker) return;
  const body = { Exchange: pick(lastConn, "ExchangeId"), Market: pick(lastConn, "MarketType"), Ticker: ticker };
  const binding = bindingInput.value.trim();
  if (binding) body.Binding = binding;
  try {
    const res = await fetch(`http://${HOST}:${activePort}/api/change-ticker`, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    infoBar.textContent = res.ok
      ? `Set ticker → ${ticker}${binding ? ` (binding ${binding})` : ""} on ${lastConn.Name ?? lastConn.Id}.`
      : `Change ticker failed: ${pick(data, "Error") || res.status}`;
  } catch (err) {
    infoBar.textContent = `Change ticker failed: ${err.message}`;
  }
}

// ---- Connection cards ----

function renderConnections(conns) {
  grid.innerHTML = "";
  results.innerHTML = "";
  galleryCtx = null;
  if (!conns.length) {
    grid.innerHTML = `<div class="empty">No active exchange connections.</div>`;
    return;
  }
  conns = [...conns].sort((a, b) =>
    (pick(a, "ExchangeId") || 0) - (pick(b, "ExchangeId") || 0) || (isSpot(a) ? 0 : 1) - (isSpot(b) ? 0 : 1));
  for (const c of conns) {
    const card = document.createElement("div");
    const baseName = c.Name ?? `${c.Exchange} · ${c.Market}`;
    const count = typeof c.MainGroupCount === "number" ? `(${c.MainGroupCount})` : "";
    const tickerCount = c.MainGroup ? c.MainGroup.tickers.length : 0;
    card.className = "card" + (tickerCount ? "" : " disabled");
    card.title = tickerCount ? "Click to scan maps" : "No tickers";
    const spot = isSpot(c);
    const mk = `<span class="mk ${spot ? "spot" : "fut"}" title="${spot ? "Spot" : "Futures"}">${spot ? "S" : "F"}</span>`;
    const ts = scanTimes[connKey(c)];
    card.dataset.key = connKey(c);
    card.innerHTML = `<div class="card-fill"></div><div class="name">${mk}${baseName}${count}</div>`
      + `<span class="age ${ageClass(ts)}" title="last scanned">${ageText(ts)}</span>`;
    grid.appendChild(card);
    if (tickerCount) card.addEventListener("click", () => showMaps(c, card));
  }
}

async function run() {
  refreshBtn.disabled = true;
  // Invalidate / abort any in-flight map scan so it can't render after refresh.
  scanToken++;
  if (scanAbort) { scanAbort.abort(); scanAbort = null; }
  if (scanCard) { setCardFill(scanCard, 0); scanCard = null; }
  stopSpinner();
  grid.innerHTML = "";
  results.innerHTML = "";
  galleryCtx = null;
  setStatus("searching", "Scanning…");
  infoBar.textContent = `Scanning ports ${PORT_START}–${PORT_END} for a running MetaScalp instance…`;

  const found = await discover();
  if (!found) {
    activePort = null;
    setStatus("offline", "Not found");
    infoBar.textContent = `No MetaScalp instance responded on ports ${PORT_START}–${PORT_END}. Is the app running?`;
    grid.innerHTML = `<div class="empty">MetaScalp is not reachable.</div>`;
    refreshBtn.disabled = false;
    return;
  }

  activePort = found.port;
  setStatus("online", `MetaScalp v${found.version}`);
  infoBar.textContent = `Connected to MetaScalp v${found.version} on port ${found.port}. Loading connections…`;

  try {
    const conns = await fetchConnections(found.port);
    infoBar.textContent = `Connected to MetaScalp v${found.version} on port ${found.port} — ${conns.length} connection(s). Loading tickers…`;
    await Promise.all(conns.map(async (c) => {
      try {
        c.MainGroup = await fetchMainGroup(found.port, c.Id);
        c.MainGroupCount = c.MainGroup.tickers.length;
      } catch (_) {
        c.MainGroup = { quote: null, tickers: [] };
        c.MainGroupCount = null;
      }
    }));
    infoBar.textContent = `Connected to MetaScalp v${found.version} on port ${found.port} — ${conns.length} connection(s). `
      + `Pick a timeframe, then click a connection to scan its maps.`;
    renderConnections(conns);
  } catch (err) {
    infoBar.textContent = `Failed to load connections: ${err.message}`;
    grid.innerHTML = `<div class="empty">Could not load connections.</div>`;
  }
  refreshBtn.disabled = false;
}

refreshBtn.addEventListener("click", run);
setInterval(refreshAges, 30000); // keep "last scanned" labels current (cheap, text-only)
loadTune();   // restore saved tune (or defaults) into the inputs + settings
loadPrefs();  // restore timeframe / min delta / binding
run();
</script>
</body>
